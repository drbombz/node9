background {
    monitor =
    path = ~/.local/wallpapers/purple-dark-fractal.png
    color = rgba(25, 20, 20, 1.0)

    blur_passes = 0
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

