
########################################################################################
AUTOGENERATED HYPR CONFIG.
PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
########################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,3200x1800,auto,1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = waybar -s ~/.config/waybar/style-n9.css
exec-once = hyprpaper --config ~/.config/hyprpaper/dgray-blue/hyprpaper.conf
exec-once = swaync
exec-once = swayosd-server
exec-once = /usr/libexec/polkit-kde-authentication-agent-1
exec-once = hyprctl setcursor 'Layan-white Cursors' 30
#exec-once = nm-applet

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf
# Programs
$terminal = kitty
$fileManager = dolphin
#$menu = rofi --show drun
$menu = ~/.config/rofi/launchers/type-2/launcher.sh

# ENV
env = XCURSOR_SIZE,30
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = .7 # -1.0 - 1.0, 0 means no modification.
    accel_profile = adaptive
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 7
    gaps_out = 7
    border_size = 3
    col.active_border = rgba(21539eEE) rgba(0D213FEE) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
    resize_on_border = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    rounding = 8
    
    blur {
        enabled = true
        size = 4
        passes = 1
	popups = true
    }

    drop_shadow = yes
    shadow_range = 6
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
    dim_inactive = false
    dim_strength = 0.4
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = switch, 0.25, 1, 0.5, 1

    animation = windows, 1, 7, switch, popin 90%
    animation = windowsOut, 1, 7, default, popin 70%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, switch
    animation = fade, 1, 7, switch
    animation = workspaces, 1, 10, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes
    preserve_split = yes
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = on
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic-mouse-v1 {
    sensitivity = -0.5
}

# Example windowrule v1
windowrule = float, ^(audacious)$
windowrule = float, ^(blueman-manager)$
windowrule = float, ^(nm-connection-editor)$
windowrule = float, ^(pavucontrol)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = nomaximizerequest, class:.* # You'll probably like this.
windowrulev2 = float,class:^(org.kde.polkit-kde-authentication-agent-1)$

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
#$mainMod = ALT+SHIFT
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive, 
#bind = $mainMod, M, exit,
bind = $mainMod, M, exec, ~/Documents/scripts/logout.sh 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, exec, firefox
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, D, fullscreen, 1

# Volume Controls
bind =, XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind =, XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind =, XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
#bind =, XF86AudioRaiseVolume, exec, pamixer -i 5
#bind =, XF86AudioLowerVolume, exec, pamixer -d 5

# Brightness Controls
bind =, XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind =, XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Capslock Control
bind =CAPS, Caps_Lock, exec, swayosd-client --caps-lock

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
